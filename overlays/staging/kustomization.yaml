# Staging 环境 — 中等副本 + 简化金丝雀 (50% → 100%)
#
# 使用:
#   kustomize build overlays/staging/ | kubectl apply -f -
#   kustomize edit set image ghcr.io/290298661-pixel/gfd=ghcr.io/290298661-pixel/gfd:v0.2.0-rc1

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

images:
  - name: ghcr.io/290298661-pixel/node-health-watcher
    newTag: latest
  - name: ghcr.io/290298661-pixel/node-guardian
    newTag: latest
  - name: ghcr.io/290298661-pixel/game-fleet-director-controller
    newTag: latest
  - name: ghcr.io/290298661-pixel/game-fleet-director-apiserver
    newTag: latest

patches:
  # ── 副本数: 2 ──
  - path: patches/replicas.yaml
    target:
      kind: Deployment
  # ── 简化 Analysis: 3 项检查，放宽阈值 ──
  - path: patches/analysis.yaml
    target:
      kind: AnalysisTemplate
      name: fleet-canary-health
