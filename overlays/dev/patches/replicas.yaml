# Dev patch: 单副本 + debug 日志
# target: 所有 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder   # 会被 target selector 匹配后替换
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: app
          env:
            - name: LOG_LEVEL
              value: debug
            - name: CANARY_ENABLED
              value: "false"
