# Dev patch: 跳过金丝雀 — 降低门槛让 CI 快速通过
# target: AnalysisTemplate/fleet-canary-health
#
# 策略: 所有指标 successCondition 改为 "result >= 0" (永远通过)
# failureLimit 设为 10 (实际上永不触发)
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: fleet-canary-health
spec:
  metrics:
    - name: node-health-score
      successCondition: "result >= 0"
      failureLimit: 10
      failureCondition: "result < -999"
    - name: allocation-success-rate
      successCondition: "result >= 0"
      failureLimit: 10
    - name: allocation-latency-p99
      successCondition: "result < 999"
      failureLimit: 10
    - name: scaling-circuit-breaker
      successCondition: "result >= 0"
      failureCondition: "result >= 999"
      failureLimit: 10
