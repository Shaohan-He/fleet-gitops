# ArgoCD Application — Game Fleet Director
# 指向 game-server-orchestrator 仓库的 deploy/ 目录

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: game-fleet-director
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Shaohan-He/game-server-orchestrator.git
    targetRevision: main
    path: deploy/

  destination:
    server: https://kubernetes.default.svc
    namespace: game-fleet-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
